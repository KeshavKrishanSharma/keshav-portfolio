<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" role="img" aria-label="Multi-Modal Evidence Review pipeline: Ingest, Quality Gate, VLM Perception, Decision Engine, Output">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c121a"/>
      <stop offset="100%" stop-color="#0a0f15"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#3f5663"/>
    </marker>
  </defs>

  <rect width="1000" height="360" rx="20" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="50" font-family="ui-sans-serif,system-ui,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#e3efeb">Multi-Modal Evidence Review</text>
  <text x="40" y="76" font-family="ui-monospace,monospace" font-size="13" fill="#22d3ee">vision-LLM perception · deterministic decision engine</text>

  <!-- connecting arrows -->
  <g stroke="#3f5663" stroke-width="2" fill="none">
    <line x1="190" y1="185" x2="232" y2="185" marker-end="url(#arrow)"/>
    <line x1="390" y1="185" x2="432" y2="185" marker-end="url(#arrow)"/>
    <line x1="590" y1="185" x2="632" y2="185" marker-end="url(#arrow)"/>
    <line x1="790" y1="185" x2="832" y2="185" marker-end="url(#arrow)"/>
  </g>

  <!-- stage template: box + number + name + subtitle -->
  <!-- 1 INGEST -->
  <g font-family="ui-sans-serif,system-ui,Segoe UI,sans-serif">
    <rect x="30" y="140" width="160" height="92" rx="14" fill="#121a24" stroke="#1f2b36" stroke-width="1.5"/>
    <circle cx="52" cy="164" r="11" fill="#1f2b36"/>
    <text x="52" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#9fb3bb">1</text>
    <text x="72" y="168" font-size="15" font-weight="700" fill="#e3efeb">INGEST</text>
    <text x="46" y="196" font-size="12" fill="#8aa0a8">typed models</text>
    <text x="46" y="214" font-size="12" fill="#8aa0a8">null-safe joins</text>

    <!-- 2 QUALITY GATE -->
    <rect x="230" y="140" width="160" height="92" rx="14" fill="#121a24" stroke="#1f2b36" stroke-width="1.5"/>
    <circle cx="252" cy="164" r="11" fill="#1f2b36"/>
    <text x="252" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#9fb3bb">2</text>
    <text x="272" y="168" font-size="15" font-weight="700" fill="#e3efeb">QUALITY GATE</text>
    <text x="246" y="196" font-size="12" fill="#8aa0a8">OpenCV · blur/light</text>
    <text x="246" y="214" font-size="12" fill="#8aa0a8">0 tokens spent</text>

    <!-- 3 VLM PERCEPTION (AI core, highlighted) -->
    <rect x="430" y="140" width="160" height="92" rx="14" fill="#0e1f22" stroke="url(#ai)" stroke-width="2"/>
    <circle cx="452" cy="164" r="11" fill="url(#ai)"/>
    <text x="452" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#06231f">3</text>
    <text x="472" y="168" font-size="15" font-weight="700" fill="#7df3d0">VLM PERCEIVE</text>
    <text x="446" y="196" font-size="12" fill="#a7d9cf">1 Claude call/row</text>
    <text x="446" y="214" font-size="12" fill="#a7d9cf">strict JSON · T=0</text>

    <!-- 4 DECISION ENGINE -->
    <rect x="630" y="140" width="160" height="92" rx="14" fill="#121a24" stroke="#1f2b36" stroke-width="1.5"/>
    <circle cx="652" cy="164" r="11" fill="#1f2b36"/>
    <text x="652" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#9fb3bb">4</text>
    <text x="672" y="168" font-size="15" font-weight="700" fill="#e3efeb">DECISION</text>
    <text x="646" y="196" font-size="12" fill="#8aa0a8">evidence · risk</text>
    <text x="646" y="214" font-size="12" fill="#8aa0a8">rules, injection-proof</text>

    <!-- 5 OUTPUT -->
    <rect x="830" y="140" width="140" height="92" rx="14" fill="#121a24" stroke="#1f2b36" stroke-width="1.5"/>
    <circle cx="852" cy="164" r="11" fill="#1f2b36"/>
    <text x="852" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#9fb3bb">5</text>
    <text x="872" y="168" font-size="15" font-weight="700" fill="#e3efeb">OUTPUT</text>
    <text x="846" y="196" font-size="12" fill="#8aa0a8">14 cols, validated</text>
    <text x="846" y="214" font-size="12" fill="#8aa0a8">enum-snapped CSV</text>
  </g>

  <!-- cross-cutting caption -->
  <rect x="30" y="270" width="940" height="44" rx="12" fill="#0e151d" stroke="#18222c" stroke-width="1.5"/>
  <text x="50" y="297" font-family="ui-monospace,monospace" font-size="13" fill="#7a9098">cross-cutting:</text>
  <text x="160" y="297" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#cdd9dd">disk cache (reproducible re-runs) · retries + backoff · TPM/RPM throttle · sample-set evaluation (precision / recall)</text>
</svg>
